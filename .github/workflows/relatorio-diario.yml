name: Relatório Diário — Pereira & Ricci

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC todos os dias
  workflow_dispatch:        # execução manual quando necessário

jobs:
  relatorio:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Instalar dependências
        run: pip install -r scripts/requirements.txt

      - name: Executar automação
        env:
          ASAAS_API_KEY:                ${{ secrets.ASAAS_API_KEY }}
          LINKLEI_EMAIL:                ${{ secrets.LINKLEI_EMAIL }}
          LINKLEI_PASSWORD:             ${{ secrets.LINKLEI_PASSWORD }}
          GMAIL_USER:                   ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:           ${{ secrets.GMAIL_APP_PASSWORD }}
          SPREADSHEET_ID:               ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON:  ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/relatorio_diario.py
